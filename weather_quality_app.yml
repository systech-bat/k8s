apiVersion: v1
kind: Namespace
metadata:
  name: weather

---

apiVersion: v1
kind: Secret
metadata:
  name: weather-secret01
  namespace: weather
stringData:
  TG_TOKEN: "6810390263:AAFJ6x_hFlvAlG2XPiPJCWOutjH83zZkqIg"
  AQICN_TOKEN: "11632a85-ff24-4d30-8c50-9ac7183a9262"
  TEMPLATE_PATH: "/template.txt"
  CITY: london
  LOG_LEVEL: info # debug

---

apiVersion: v1
kind: ConfigMap
metadata: 
  name: weather-cm01
  namespace: weather
data:
  template.txt:  |
    🔥 <b>Warning</b>

    ℹ️ PM 2.5: {{ .PM25 }}

    ℹ️ PM 10: {{ .PM10 }}

    💬 URL: {{ .URL }}

    IT will kill u man 

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-deploy01
  namespace: weather
spec:
  replicas: 2
  selector:
    matchLabels:
      app: weather-pod
  template:
    metadata:
      labels:
        app: weather-pod
    spec:   
      containers:
        - name: weather-cont01
          image: bazdoc/weather_quality:v1.1
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 150m
              memory: 192Mi
          ports:
            - name: web
              protocol: TCP
              containerPort: 8080
            - name: health
              protocol: TCP
              containerPort: 8086
          envFrom:
            - secretRef:
                name: weather-secret01
          volumeMounts:
            - name: template-volume01
              mountPath: "/template.txt"
              subPath: template.txt
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 5  
          livenessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 5
            periodSeconds: 5    
      volumes:
      - name: template-volume01
        configMap:
          name: weather-cm01       

---
apiVersion: v1
kind: Service
metadata:
  name: weather-svc
  namespace: weather     
spec:
  type: LoadBalancer
  selector:
    app: weather-pod
  ports:
    - name: web-svc
      protocol: TCP
      port: 8080
      targetPort: 8080

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-ingress
  namespace: weather
spec:
  ingressClassName: nginx
  rules:
    - host: weather.bazcorp.local
      http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
             name: weather-svc
             port:
              number: 8080

