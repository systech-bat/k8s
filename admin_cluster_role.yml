apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: admin-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get","list","create","delete","watch"]
  - apiGroups: [""]
    resources: [persistentvolumes]
    verbs: ["get","list","create","delete","watch"]
  - apiGroups: [storage.k8s.io]
    resources: [storageclasses]
    verbs: ["get","list","create","delete","watch"]
